name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pillow
          python -m pip install faster-whisper sounddevice numpy pynput pystray pyperclip pyautogui

      - name: Create icon.ico from icon.png
        shell: pwsh
        run: |
          python -c "from PIL import Image; img = Image.open('icon.png'); img.save('icon.ico', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      - name: Build with PyInstaller
        run: python -m PyInstaller NeuraDictate.spec --clean --noconfirm

      - name: Create ZIP archive
        shell: pwsh
        run: |
          Compress-Archive -Path dist\NeuraDictate -DestinationPath NeuraDictate-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeuraDictate-Windows
          path: NeuraDictate-Windows.zip
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: NeuraDictate-Windows.zip
