name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pillow
          python -m pip install faster-whisper sounddevice numpy pynput pystray pyperclip pyautogui

      - name: Create icon.ico from icon.png
        shell: pwsh
        run: |
          python -c "from PIL import Image; img = Image.open('icon.png'); img.save('icon.ico', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      - name: Build with PyInstaller
        run: python -m PyInstaller NeuraDictate.spec --clean --noconfirm

      - name: Smoke test — verify modules import inside bundle
        shell: pwsh
        run: |
          # Run bundle briefly with a mode that only imports and exits
          $env:NEURADICTATE_MODE = "download_model"
          $env:NEURADICTATE_MODEL = "__test_nonexistent__"
          $proc = Start-Process -FilePath "dist\NeuraDictate\NeuraDictate.exe" -PassThru -NoNewWindow -RedirectStandardError "stderr.log" -RedirectStandardOutput "stdout.log"
          Start-Sleep -Seconds 15
          if (-not $proc.HasExited) { Stop-Process -Id $proc.Id -Force }
          Write-Host "=== stdout ==="
          if (Test-Path stdout.log) { Get-Content stdout.log }
          Write-Host "=== stderr ==="
          if (Test-Path stderr.log) { Get-Content stderr.log }
          # If the import failed with ModuleNotFoundError, fail the build
          if ((Test-Path stderr.log) -and ((Get-Content stderr.log -Raw) -match "ModuleNotFoundError|ImportError")) {
            Write-Error "Bundle has import errors"
            exit 1
          }

      - name: Create ZIP archive
        shell: pwsh
        run: |
          Compress-Archive -Path dist\NeuraDictate -DestinationPath NeuraDictate-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeuraDictate-Windows
          path: NeuraDictate-Windows.zip
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: NeuraDictate-Windows.zip
